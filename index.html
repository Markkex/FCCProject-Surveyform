<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Survey Form</title>
</head>
<body>
    <h1 id="title">Survey Form</h1>
    <p id="description">This is a text for description of the following Form</p>
    <form id="survey-form" action="submit">
        <label for="name" id="name-label">Name:</label>
        <input id="name" type="text" placeholder="name"/><br/>
        <label for="email" id="E-Mail-label">E-Mail:</label>
        <input id="email" type="email" placeholder="email"><br/>
        <label for="age" id="age-label">Age:</label>
        <input id="number" min="10" max="99" type="number" placeholder="age"><br/>
        
        <label for="cars">Choose a car:</label>
        <select name="cars" id="cars">
          <option value="volvo">Volvo</option>
          <option value="saab">Saab</option>
          <option value="mercedes">Mercedes</option>
          <option value="audi">Audi</option>
        </select>
<br/>
        <label for="cars">Choose your sex:</label><br/>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label><br>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label><br>
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label>
<br/>

        <label for="cars">Choose a transport:</label><br/>
        <input type="checkbox" id="vehicle1" name="vehicle1" value="Bike">
        <label for="vehicle1"> I have a bike</label><br>
        <input type="checkbox" id="vehicle2" name="vehicle2" value="Car">
        <label for="vehicle2"> I have a car</label><br>
        <input type="checkbox" id="vehicle3" name="vehicle3" value="Boat">
        <label for="vehicle3"> I have a boat</label><br>
<br/>
        <textarea placeholder="tell us a story"></textarea> <br/>
<br/>
        <button type="submit">Submit</button>
    </form>

    
</body>
<script src="https://cdn.freecodecamp.org/testable-projects-fcc/v1/bundle.js"></script>
</html>
